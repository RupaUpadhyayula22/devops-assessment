name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install setuptools flask pytest
          python setup.py install

      - name: Run tests
        run: pytest tests/ -v

      # Linting as per assessment requirements
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --max-line-length=127 --statistics --exclude=venv,.git,terraform