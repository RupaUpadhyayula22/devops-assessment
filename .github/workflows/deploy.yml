name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # Create ECR repository if it doesn't already exist
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names platform-assessment --region ap-northeast-2 || \
          aws ecr create-repository --repository-name platform-assessment --region ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Build for linux/amd64 — required for AWS Fargate
      # Tagged with git SHA for traceability
      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: platform-assessment
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster platform-assessment-cluster \
            --service platform-assessment-service \
            --force-new-deployment \
            --region ap-northeast-2